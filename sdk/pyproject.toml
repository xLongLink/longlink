[build-system]
requires = ["setuptools>=68", "setuptools-scm[toml]>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "longlink"
dynamic = ["version"]
dependencies = [
    "alembic",
    "click",
    "lxml",
    "uvicorn",
    "pydantic",
    "pydantic-settings",
    "fsspec",
    "fastapi>=0.138.0",
    "aiosqlite",
    "asyncpg",
    "sqlmodel",
    "xmltodict",
]
requires-python = ">=3.14"
authors = [
    {name = "LongLink SAGL", email = "info@longlink.ch"}
]
maintainers = []
description = "Lovely Spam! Wonderful Spam!"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE*"]
keywords = ["longlink", "sdk", "fastapi", "sqlalchemy", "pydantic", "alembic"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python"
]

[project.optional-dependencies]
cli = [
  "rich",
  "click",
]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-mock",
    "pyright",
    "lxml-stubs",
    "isort",
    "httpx2",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-mock",
    "pyright",
    "lxml-stubs",
    "isort",
    "httpx2",
]

[project.urls]
Homepage = "https://www.longlink.dev"
Documentation = "https://longlink.dev/docs"
Repository = "https://github.com/xLongLink/longlink.git"
"Bug Tracker" = "https://github.com/xLongLink/longlink/issues"

[tool.setuptools_scm]
root = ".."
version_scheme = "no-guess-dev"
local_scheme = "no-local-version"

[project.scripts]
longlink = "longlink.__main__:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["longlink*"]
exclude = ["sample*"]

[tool.setuptools.package-data]
longlink = [".static/**"]

[tool.ruff]
target-version = "py314"

[tool.ruff.lint]
select = ["UP", "D300"]

[tool.isort]
from_first = false
no_sections = true
lines_between_types = 0
length_sort = true

[tool.pyright]
typeCheckingMode = "basic"
pythonVersion = "3.14"
venvPath = "."
venv = ".venv"
include = ["longlink", "tests"]
exclude = [".venv", "build", "dist", "dev", "longlink/.static", "**/__pycache__"]
extraPaths = ["."]
