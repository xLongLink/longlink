[build-system]
requires = ["setuptools>=68", "setuptools-scm[toml]>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "longlink"
dynamic = ["version"]
dependencies = [
    "alembic",
    "click",
    "lxml",
    "uvicorn",
    "pydantic",
    "pydantic-settings",
    "httpx",
    "fsspec",
    "fastapi",
    "sqlmodel",
    "xmltodict",
]
requires-python = ">=3.12"
authors = [
    {name = "LongLink SAGL", email = "info@longlink.ch"}
]
maintainers = []
description = "Lovely Spam! Wonderful Spam!"
readme = "README.md"
license = {text = "MIT"}
license-files = ["LICENSE*"]
keywords = ["longlink", "sdk", "fastapi", "sqlalchemy", "pydantic", "alembic"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python"
]

[project.optional-dependencies]
cli = [
  "rich",
  "click",
]
dev = [
  "pytest==8.4.2",
  "pytest-asyncio==0.24.0",
  "isort==8.0.1"
]

[dependency-groups]
dev = [
  "pytest==8.4.2",
  "pytest-asyncio==0.24.0",
  "isort==8.0.1"
]

[project.urls]
Homepage = "https://www.longlink.dev"
Documentation = "https://docs.longlink.dev"
Repository = "https://github.com/xLongLink/longlink.git"
"Bug Tracker" = "https://github.com/xLongLink/longlink/issues"

[tool.setuptools_scm]
version_scheme = "no-guess-dev"
local_scheme = "no-local-version"

[project.scripts]
longlink = "longlink.__main__:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["longlink*"]
exclude = ["sample*"]

[tool.setuptools.package-data]
longlink = [".static/**"]

[tool.isort]
from_first = false
no_sections = true
lines_between_types = 0
length_sort = true
