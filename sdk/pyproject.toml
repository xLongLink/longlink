[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "longlink"
dynamic = ["version"]
dependencies = [
    "alembic",
    "click",
    "lxml",
    "uvicorn",
    "pydantic",
    "pydantic-settings",
    "httpx",
    "fsspec",
    "fastapi",
    "sqlmodel",
    "xmltodict",
]
requires-python = ">=3.12"
authors = [
    {name = "LongLink SAGL", email = "info@longlink.ch"}
]
maintainers = []
description = "Lovely Spam! Wonderful Spam!"
readme = "README.md"
license = {text = "MIT"}
license-files = ["LICENSE*"]
keywords = ["longlink", "sdk", "fastapi", "sqlalchemy", "pydantic", "alembic"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python"
]

[project.optional-dependencies]
cli = [
  "rich",
  "click",
]
dev = [
  "pytest==8.4.2",
  "pytest-asyncio==0.24.0",
  "isort==8.0.1"
]

[dependency-groups]
dev = [
  "pytest==8.4.2",
  "pytest-asyncio==0.24.0",
  "isort==8.0.1"
]

[project.urls]
Homepage = "https://www.longlink.dev"
Documentation = "https://docs.longlink.dev"
Repository = "https://github.com/xLongLink/longlink.git"
"Bug Tracker" = "https://github.com/xLongLink/longlink/issues"

[tool.hatch.version]
source = "vcs"
raw-options = { local_scheme = "no-local-version" }
fallback-version = "0.0.0"

[project.scripts]
longlink = "longlink.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["longlink"]
include = [
    "longlink/.static/**",
    "longlink/.static/web/**",
]
exclude = [
    "sample/**",
]

[tool.hatch.build.targets.sdist]
include = [
    "longlink",
    "longlink/.static/**",
    "longlink/.static/web/**",
    "README.md",
]
exclude = [
    "sample/**",
]

[tool.isort]
from_first = false
no_sections = true
lines_between_types = 0
length_sort = true
