name: CI

on:
  push:
    branches:
      - main
      - dev

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - api
          - sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: pip install -e '.[dev]'

      - name: Run tests
        working-directory: ${{ matrix.component }}
        run: pytest
