name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        run: |
          git fetch --tags --force

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
          else
            RAW_TAG="${{ github.ref_name }}"
          fi

          if [[ -z "$RAW_TAG" ]]; then
            LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n 1)

            if [[ -z "$LATEST_TAG" ]]; then
              echo "Release tag is required when no existing tags are present."
              exit 1
            else
              VERSION="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

              if [[ -z "$MAJOR" || -z "$MINOR" || -z "$PATCH" ]]; then
                echo "Invalid latest release tag: $LATEST_TAG"
                exit 1
              fi

              MINOR=$((MINOR + 1))
              PATCH=0
              RAW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          TAG="${RAW_TAG#v}"

          if [[ ! "$RAW_TAG" =~ ^v.+$ ]]; then
            echo "Invalid release tag: $RAW_TAG. It must start with 'v'."
            exit 1
          fi

          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $RAW_TAG"
            exit 1
          fi

          if ! git rev-parse --verify --quiet "refs/tags/$RAW_TAG" >/dev/null; then
            echo "Release tag does not exist: $RAW_TAG"
            exit 1
          fi

          echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"

  # The SDK is published to PyPI
  publish-sdk:
    if: always() && needs.release.result == 'success'
    needs: [release]
    runs-on: ubuntu-latest

    environment:
      name: release

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Install web dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Build web assets for SDK
        run: bun run --cwd web build:sdk --logLevel warn

      - name: Resolve SDK package version
        id: sdk_version
        run: |
          RAW_VERSION="${{ needs.release.outputs.tag }}"
          SDK_VERSION="${RAW_VERSION#v}"

          if [[ ! "$SDK_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid SDK version: $SDK_VERSION"
            exit 1
          fi

          echo "value=$SDK_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set SDK version
        working-directory: sdk
        env:
          SDK_VERSION: ${{ steps.sdk_version.outputs.value }}
        run: |
          python - <<'PYTHON'
          from pathlib import Path
          import os
          import tomllib

          version = os.environ["SDK_VERSION"]
          pyproject_path = Path("pyproject.toml")
          data = tomllib.loads(pyproject_path.read_text())
          old_version = data["project"]["version"]

          if old_version == version:
              raise SystemExit("SDK version is already set.")

          pyproject_path.write_text(
              pyproject_path.read_text().replace(
                  f'version = "{old_version}"',
                  f'version = "{version}"',
                  1,
              )
          )
          PYTHON

      - name: Build the distribution
        working-directory: sdk
        run: python -m build

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist

  # The API is packaged into a container, so we will publish the image to GHCR on each release.
  publish-api-image:
    if: always() && needs.release.result == 'success'
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/longlink
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.tag }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-github-release:
    if: always() && needs.release.result == 'success'
    needs: [release, publish-sdk, publish-api-image]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          git fetch --tags --force

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)

          {
            echo "## Changes"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --pretty=format:'- %s (%h)' "$PREVIOUS_TAG..$TAG"
            else
              git log --pretty=format:'- %s (%h)' "$TAG^"
            fi
            echo
            echo
            echo "## Contributors"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --format='%an <%ae>' "$PREVIOUS_TAG..$TAG" | sort -u
            else
              git log --format='%an <%ae>' "$TAG^" | sort -u
            fi
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
