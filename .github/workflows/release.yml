name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # The SDK is published to PyPI.
  publish-sdk:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    environment:
      name: release

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install web dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Build web assets for SDK
        run: bun run --cwd web build:sdk --logLevel warn
        env:
          VERSION: ${{ github.ref_name }}

      - name: Build the distribution
        working-directory: sdk
        run: uvx --from build pyproject-build

      - name: Publish to PyPI
        working-directory: sdk
        run: uv publish --trusted-publishing automatic

  # The API is packaged into a container, so we will publish the image to GHCR on each release.
  publish-api-image:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: api/Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/xlonglink/longlink:latest
            ghcr.io/xlonglink/longlink:${{ github.ref_name }}

  # The SDK sample is also published as a container image for one-command demos.
  publish-sdk-sample-image:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install SDK dependencies
        working-directory: sdk
        run: uv sync

      - name: Generate sample app scaffold
        working-directory: sdk
        run: .venv/bin/longlink init --folder sample-app

      - name: Build sample app Dockerfile
        working-directory: sdk/sample-app
        run: ../.venv/bin/longlink build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sample image
        uses: docker/build-push-action@v7
        with:
          context: sdk/sample-app
          file: sdk/sample-app/Dockerfile
          push: true
          tags: |
            ghcr.io/xlonglink/sample:latest
            ghcr.io/xlonglink/sample:${{ github.ref_name }}

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-sdk, publish-api-image, publish-sdk-sample-image]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Trigger apply workflow_dispatch in target repository
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: apply.yml
          repo: xLongLink/linklong
          ref: main
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Trigger update workflow_dispatch in target repository
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: update.yml
          repo: xLongLink/linklong
          inputs: >-
            { "version": "${{ github.ref_name }}" }
          ref: main
          token: ${{ secrets.CROSS_REPO_TOKEN }}
