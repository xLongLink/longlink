name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch --tags --force

          RAW_TAG="${{ github.ref_name }}"

          if [[ ! "$RAW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $RAW_TAG. Expected format vMAJOR.MINOR.PATCH."
            exit 1
          fi

          if ! git rev-parse --verify --quiet "refs/tags/$RAW_TAG" >/dev/null; then
            echo "Release tag does not exist: $RAW_TAG"
            exit 1
          fi

          echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"

  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run API tests
        working-directory: api
        run: uv pip install --system -e '.[dev]' && uv run pytest

      - name: Run SDK tests
        working-directory: sdk
        run: uv pip install --system -e '.[dev]' && uv run pytest

      - name: Run web tests
        working-directory: web
        run: bun install --frozen-lockfile && bun test

  # The SDK is published to PyPI
  publish-sdk:
    if: always() && needs.release.result == 'success' && needs.tests.result == 'success'
    needs: [release, tests]
    runs-on: ubuntu-latest

    environment:
      name: release

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Install web dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Build web assets for SDK
        run: bun run --cwd web build:sdk --logLevel warn

      - name: Resolve SDK package version
        id: sdk_version
        run: |
          RAW_VERSION="${{ needs.release.outputs.tag }}"
          SDK_VERSION="${RAW_VERSION#v}"

          if [[ ! "$SDK_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid SDK version: $SDK_VERSION"
            exit 1
          fi

          echo "value=$SDK_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set SDK version
        working-directory: sdk
        env:
          SDK_VERSION: ${{ steps.sdk_version.outputs.value }}
        run: |
          python - <<'PYTHON'
          from pathlib import Path
          import os
          import tomllib

          version = os.environ["SDK_VERSION"]
          pyproject_path = Path("pyproject.toml")
          data = tomllib.loads(pyproject_path.read_text())
          old_version = data["project"]["version"]

          if old_version == version:
              raise SystemExit("SDK version is already set.")

          pyproject_path.write_text(
              pyproject_path.read_text().replace(
                  f'version = "{old_version}"',
                  f'version = "{version}"',
                  1,
              )
          )
          PYTHON

      - name: Build the distribution
        working-directory: sdk
        run: python -m build

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist

  # The API is packaged into a container, so we will publish the image to GHCR on each release.
  publish-api-image:
    if: always() && needs.release.result == 'success' && needs.tests.result == 'success'
    needs: [release, tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/longlink
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.tag }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-github-release:
    if: always() && needs.release.result == 'success' && needs.tests.result == 'success'
    needs: [release, tests, publish-sdk, publish-api-image]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          TAG: ${{ needs.release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch --tags --force

          PREVIOUS_TAG=""
          FOUND_CURRENT=false
          for CANDIDATE in $(git tag --list 'v*' --sort=-version:refname); do
            if [ "$FOUND_CURRENT" = true ]; then
              PREVIOUS_TAG="$CANDIDATE"
              break
            fi

            if [ "$CANDIDATE" = "$TAG" ]; then
              FOUND_CURRENT=true
            fi
          done

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="$PREVIOUS_TAG..$TAG"
          else
            RANGE="$TAG"
          fi

          {
            echo "## Changes"
            echo
            while IFS=$'\t' read -r SUBJECT SHORT_SHA FULL_SHA; do
              echo "- $SUBJECT ([${SHORT_SHA}](https://github.com/${REPOSITORY}/commit/${FULL_SHA}))"
            done < <(git log --pretty=format:'%s%x09%h%x09%H' "$RANGE")
            echo
            echo
            echo "## Contributors"
            echo
            while IFS=$'\t' read -r NAME EMAIL; do
              USERNAME=""
              if [[ "$EMAIL" =~ ^[0-9]+\+([^@]+)@users\.noreply\.github\.com$ ]]; then
                USERNAME="${BASH_REMATCH[1]}"
              elif [[ "$EMAIL" =~ ^([^@]+)@users\.noreply\.github\.com$ ]]; then
                USERNAME="${BASH_REMATCH[1]}"
              fi

              if [ -n "$USERNAME" ]; then
                echo "<a href=\"https://github.com/${USERNAME}\"><img src=\"https://github.com/${USERNAME}.png?size=80\" width=\"40\" height=\"40\" alt=\"${USERNAME}\" title=\"${USERNAME}\" style=\"border-radius: 50%;\" /></a>"
              else
                echo "- $NAME"
              fi
            done < <(git log --format='%an%x09%ae' "$RANGE" | sort -u)
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
