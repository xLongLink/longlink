name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # The SDK is published to PyPI.
  publish-sdk:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    environment:
      name: release

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install web dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Build web assets for SDK
        run: bun run --cwd web build:sdk --logLevel warn

      - name: Build the distribution
        working-directory: sdk
        run: uvx --from build pyproject-build

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist

  # The API is packaged into a container, so we will publish the image to GHCR on each release.
  publish-api-image:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/longlink
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.ref_name }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-sdk, publish-api-image]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch --tags --force

          PREVIOUS_TAG=""
          FOUND_CURRENT=false
          for CANDIDATE in $(git tag --list 'v*' --sort=-version:refname); do
            if [ "$FOUND_CURRENT" = true ]; then
              PREVIOUS_TAG="$CANDIDATE"
              break
            fi

            if [ "$CANDIDATE" = "$TAG" ]; then
              FOUND_CURRENT=true
            fi
          done

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="$PREVIOUS_TAG..$TAG"
          else
            RANGE="$TAG"
          fi

          {
            echo "## Changes"
            echo
            while IFS=$'\t' read -r SUBJECT SHORT_SHA FULL_SHA; do
              echo "- $SUBJECT ([${SHORT_SHA}](https://github.com/${REPOSITORY}/commit/${FULL_SHA}))"
            done < <(git log --pretty=format:'%s%x09%h%x09%H' "$RANGE")
            echo
            echo
            echo "## Contributors"
            echo
            while IFS=$'\t' read -r NAME EMAIL; do
              USERNAME=""
              if [[ "$EMAIL" =~ ^[0-9]+\+([^@]+)@users\.noreply\.github\.com$ ]]; then
                USERNAME="${BASH_REMATCH[1]}"
              elif [[ "$EMAIL" =~ ^([^@]+)@users\.noreply\.github\.com$ ]]; then
                USERNAME="${BASH_REMATCH[1]}"
              fi

              if [ -n "$USERNAME" ]; then
                echo "<a href=\"https://github.com/${USERNAME}\"><img src=\"https://github.com/${USERNAME}.png?size=80\" width=\"40\" height=\"40\" alt=\"${USERNAME}\" title=\"${USERNAME}\" style=\"border-radius: 50%;\" /></a>"
              else
                echo "- $NAME"
              fi
            done < <(git log --format='%an%x09%ae' "$RANGE" | sort -u)
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
