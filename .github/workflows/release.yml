name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    if: github.event_name == 'release' && github.event.release.draft == false
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - name: Resolve release tag from release event
        id: release_tag
        run: |
          RAW_TAG="${{ github.event.release.tag_name }}"
          TAG="${RAW_TAG#v}"

          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $RAW_TAG"
            exit 1
          fi

          echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"

  # The SDK is published to PyPI
  publish-sdk:
    if: always() && needs.release.result == 'success'
    needs: [release]
    runs-on: ubuntu-latest

    environment:
      name: release

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Resolve SDK package version
        id: sdk_version
        run: |
          RAW_VERSION="${{ needs.release.outputs.tag }}"
          SDK_VERSION="${RAW_VERSION#v}"

          if [[ ! "$SDK_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid SDK version: $SDK_VERSION"
            exit 1
          fi

          echo "value=$SDK_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build the distribution
        working-directory: sdk
        env:
          LONG_LINK_VERSION: ${{ steps.sdk_version.outputs.value }}
        run: python -m build

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist

  # The API is packaged into a container, so we will publish the image to GHCR on each release.
  publish-api-image:
    if: always() && needs.release.result == 'success'
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/longlink
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.tag }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
