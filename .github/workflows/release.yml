name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # The SDK is published to PyPI.
  publish-sdk:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    environment:
      name: release

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install web dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Build web assets for SDK
        run: bun run --cwd web build:sdk --logLevel warn
        env:
          VERSION: ${{ github.ref_name }}

      - name: Build the distribution
        working-directory: sdk
        run: uvx --from build pyproject-build

      - name: Publish to PyPI
        working-directory: sdk
        run: uv publish --trusted-publishing automatic

  # The API is packaged into a container, so we will publish the image to GHCR on each release.
  publish-api-image:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: api/Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/xlonglink/longlink:latest
            ghcr.io/xlonglink/longlink:${{ github.ref_name }}

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-sdk, publish-api-image]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
