name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # The API is packaged into a container, so test it on the supported Python runtime.
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: api
        run: uv sync --extra dev

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build API web bundle
        working-directory: web
        run: bun run vite build --mode api --logLevel warn

      - name: Run tests
        working-directory: api
        run: ENVIRONMENT=testing uv run pytest --cov=src --cov-report=term-missing tests

      - name: Run Pyright
        working-directory: api
        run: uv run --extra dev pyright

  # The SDK requires Python 3.14 or newer.
  sdk-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: sdk
        run: uv sync --extra runtime --extra cli --extra dev

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build SDK web bundle
        working-directory: web
        run: bun run vite build --mode sdk --logLevel warn

      - name: Run tests
        working-directory: sdk
        run: uv run pytest --cov=longlink --cov-report=term-missing tests

      - name: Run Pyright
        working-directory: sdk
        run: uv run --group dev pyright

      - name: Build SDK distribution
        working-directory: sdk
        run: uv build

      - name: Verify SDK distribution
        working-directory: sdk
        run: |
          uv venv /tmp/longlink-wheel-test
          uv pip install --python /tmp/longlink-wheel-test/bin/python dist/*.whl
          cd /tmp
          /tmp/longlink-wheel-test/bin/python - <<'PY'
          import sys
          from importlib import metadata
          from longlink.tenant.database.migrations import alembic_script_location

          location = alembic_script_location()
          assert (location / "env.py").is_file()
          assert (location / "script.py.mako").is_file()
          assert (location / "versions" / "20260706_0001_shared_users.py").is_file()
          assert "longlink.app" not in sys.modules
          assert "longlink.storage" not in sys.modules
          assert "longlink.database" not in sys.modules
          assert not any(requirement.lower().startswith("tenant") for requirement in metadata.requires("longlink") or [])
          PY
          /tmp/longlink-wheel-test/bin/longlink --help >/dev/null
          /tmp/longlink-wheel-test/bin/longlink init --help >/dev/null

  # The web package uses Bun, so run its test suite separately.
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: web
        run: bun test

      - name: Run typecheck
        working-directory: web
        run: bun run typecheck

      - name: Build API bundle
        working-directory: web
        run: bun run vite build --mode api --logLevel warn

      - name: Build SDK bundle
        working-directory: web
        run: bun run vite build --mode sdk --logLevel warn
