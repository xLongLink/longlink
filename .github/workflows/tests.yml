name: Tests

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  # The API is packaged into a container, so test it on the supported Python runtime.
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: api
        run: uv sync --locked --extra dev

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build API web bundle
        working-directory: web
        run: bun run vite build --mode api --logLevel warn

      - name: Run tests
        working-directory: api
        run: ENVIRONMENT=testing uv run --locked pytest --cov=src --cov-report=term-missing tests

      - name: Run Pyright
        working-directory: api
        run: uv run --locked --extra dev pyright

  # The SDK requires Python 3.14 or newer.
  sdk-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: sdk
        run: uv sync --locked --extra dev

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build SDK web bundle
        working-directory: web
        run: bun run vite build --mode sdk --logLevel warn

      - name: Run tests
        working-directory: sdk
        run: uv run --locked pytest --cov=longlink --cov-report=term-missing tests

      - name: Run generated scaffold tests
        working-directory: sdk
        run: sh tests/scaffold-smoke.sh

      - name: Run Pyright
        working-directory: sdk
        run: uv run --locked --group dev pyright

      - name: Build SDK distribution
        working-directory: sdk
        run: uv build

  # The web package uses Bun, so run its test suite separately.
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: web
        run: bun test

      - name: Run typecheck
        working-directory: web
        run: bun run typecheck

      - name: Build API bundle
        working-directory: web
        run: bun run vite build --mode api --logLevel warn

      - name: Build SDK bundle
        working-directory: web
        run: bun run vite build --mode sdk --logLevel warn
