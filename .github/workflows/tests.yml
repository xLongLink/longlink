name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  # The API is packaged into a container, so test it on the supported Python runtime.
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          version: "0.11.30"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        working-directory: api
        run: uv sync --locked --extra dev

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build API web bundle
        working-directory: web
        run: bun run vite build --mode api --logLevel warn

      - name: Run tests
        working-directory: api
        run: ENVIRONMENT=testing uv run --locked pytest --cov=src --cov-report=term-missing tests

      - name: Run Pyright
        working-directory: api
        run: uv run --locked --extra dev pyright

  # The SDK requires Python 3.12 or newer.
  sdk-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          version: "0.11.30"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        working-directory: sdk
        run: uv sync --locked --extra dev

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build SDK web bundle
        working-directory: web
        run: bun run vite build --mode sdk --logLevel warn

      - name: Run tests
        working-directory: sdk
        run: uv run --locked pytest --cov=longlink --cov-report=term-missing tests

      - name: Run generated scaffold tests
        working-directory: sdk
        run: sh tests/scaffold-smoke.sh

      - name: Run Pyright
        working-directory: sdk
        run: uv run --locked --group dev pyright

      - name: Build SDK distribution
        working-directory: sdk
        run: uv build

  # The web package uses Bun, so run its test suite separately.
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: web
        run: bun run test

      - name: Run typecheck
        working-directory: web
        run: bun run typecheck

      - name: Build API bundle
        working-directory: web
        run: bun run vite build --mode api --logLevel warn

      - name: Build SDK bundle
        working-directory: web
        run: bun run vite build --mode sdk --logLevel warn
