services:
    postgres:
        image: postgres:16-alpine
        container_name: longlink-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-longlink}
            POSTGRES_USER: ${POSTGRES_USER:-longlink}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-longlink}
        ports:
            - '${POSTGRES_PORT:-5432}:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${POSTGRES_USER:-longlink} -d ${POSTGRES_DB:-longlink}',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    minio:
        image: minio/minio:latest
        container_name: longlink-minio
        restart: unless-stopped
        command: server /data --console-address ':9001'
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
        ports:
            - '${MINIO_API_PORT:-9000}:9000'
            - '${MINIO_CONSOLE_PORT:-9001}:9001'
        volumes:
            - minio_data:/data
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    minio-setup:
        image: minio/mc:latest
        container_name: longlink-minio-setup
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
            mc mb --ignore-existing local/${MINIO_BUCKET:-longlink} &&
            mc anonymous set private local/${MINIO_BUCKET:-longlink}
            "
        restart: 'no'

volumes:
    postgres_data:
    minio_data:
