# Shared internal proxy resources for one namespace.
# The proxy stays inside the cluster and provides a stable namespace entrypoint.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute-proxy
  namespace: $namespace
  labels:
    managed-by: longlink
    compute-role: proxy
    app: compute-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compute-proxy
  template:
    metadata:
      labels:
        app: compute-proxy
    spec:
      containers:
        - name: compute-proxy
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:5678
            - -status-code=404
            - -text=application not found
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: compute-proxy
  namespace: $namespace
  labels:
    managed-by: longlink
    compute-role: proxy
spec:
  type: ClusterIP
  selector:
    app: compute-proxy
  ports:
    - port: 5678
      targetPort: 5678
