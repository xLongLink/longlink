# Shared Kong resources for one application namespace.
# Kong stays outside LongLink and enforces a simple API key before routing to the app.

---
apiVersion: v1
kind: Secret
metadata:
  name: $name-kong-key-auth
  namespace: $namespace
  labels:
    managed-by: longlink
    compute-role: application
    app: $name
  annotations:
    konghq.com/credential: key-auth
type: Opaque
stringData:
  key: $proxy_secret
---
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: $name-kong-consumer
  namespace: $namespace
  labels:
    managed-by: longlink
    compute-role: application
    app: $name
username: $namespace-$name
credentials:
  - $name-kong-key-auth
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: $name-key-auth
  namespace: $namespace
  labels:
    managed-by: longlink
    compute-role: application
    app: $name
plugin: key-auth
config:
  hide_credentials: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: $name
  namespace: $namespace
  labels:
    managed-by: longlink
    compute-role: application
    app: $name
  annotations:
    konghq.com/plugins: $name-key-auth
    konghq.com/strip-path: "true"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /$namespace/$name
            pathType: Prefix
            backend:
              service:
                name: $name
                port:
                  number: $port
