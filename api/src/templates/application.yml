# Template for application resources in one namespace.
# Each app gets its own deployment, ClusterIP service, and secret-backed env vars.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: $name
  namespace: $namespace
  labels:
    managed-by: longlink
    compute-role: application
    app: $name
    longlink.io/application-id: $application_id
spec:
  replicas: 1
  selector:
    matchLabels:
      app: $name
  template:
    metadata:
      annotations:
        longlink.io/rollout-token: "$rollout_token"
      labels:
        managed-by: longlink
        compute-role: application
        app: $name
        longlink.io/application-id: $application_id
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: $name
          image: $image
          imagePullPolicy: Always
          ports:
            - containerPort: $port
          startupProbe:
            httpGet:
              path: /health
              port: $port
            periodSeconds: 2
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: $port
            periodSeconds: 5
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: $name
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: $name
  namespace: $namespace
  labels:
    managed-by: longlink
    compute-role: application
    app: $name
    longlink.io/application-id: $application_id
spec:
  type: ClusterIP
  selector:
    app: $name
  ports:
    - port: $port
      targetPort: $port
