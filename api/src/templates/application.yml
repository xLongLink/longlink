# Template for application resources in one namespace.
# Each app gets its own deployment, ClusterIP service, and secret-backed env vars.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: $name
  namespace: $namespace
  labels:
    managed-by: control-plane
    compute-role: application
    app: $name
spec:
  replicas: 1
  selector:
    matchLabels:
      app: $name
  template:
    metadata:
      labels:
        app: $name
    spec:
      containers:
        - name: $name
          image: $image
          ports:
            - containerPort: $port
          envFrom:
            - secretRef:
                name: $name
---
apiVersion: v1
kind: Service
metadata:
  name: $name
  namespace: $namespace
  labels:
    managed-by: control-plane
    compute-role: application
spec:
  type: ClusterIP
  selector:
    app: $name
  ports:
    - port: $port
      targetPort: $port
