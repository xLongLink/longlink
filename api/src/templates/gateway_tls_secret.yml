# Template for the optional per-cluster Envoy gateway TLS secret.
---
apiVersion: v1
kind: Secret
metadata:
  name: longlink-gateway-tls
  namespace: longlink-system
  labels:
    app: longlink-gateway
type: kubernetes.io/tls
data:
  tls.crt: "$gateway_tls_certificate"
  tls.key: "$gateway_tls_key"
