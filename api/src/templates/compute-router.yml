# Base router resources for compute namespace.
# Deploys default backend returning 404 when no application matches.
# Includes both deployment and service for the router.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute-router
  namespace: $namespace
  labels:
    managed-by: control-plane
    compute-role: base
    app: compute-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compute-router
  template:
    metadata:
      labels:
        app: compute-router
    spec:
      containers:
        - name: compute-router
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:5678
            - -status-code=404
            - -text=application not found
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: compute-router
  namespace: $namespace
  labels:
    managed-by: control-plane
    compute-role: base
spec:
  selector:
    app: compute-router
  ports:
    - port: 5678
      targetPort: 5678
