# Template for one owned organization Namespace and gateway ingress policy.
---
apiVersion: v1
kind: Namespace
metadata:
  name: $namespace
  annotations:
    longlink.io/platform-version: "$platform_version"
    longlink.io/runtime-revision: "$runtime_revision"
    longlink.io/template-revision: "$template_revision"
  labels:
    app.kubernetes.io/managed-by: longlink-platform
    longlink.io/compute-id: "$compute_id"
    longlink.io/organization-id: "$organization_id"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: longlink-gateway-ingress
  namespace: $namespace
  annotations:
    longlink.io/platform-version: "$platform_version"
    longlink.io/runtime-revision: "$runtime_revision"
    longlink.io/template-revision: "$template_revision"
  labels:
    app.kubernetes.io/managed-by: longlink-platform
    longlink.io/compute-id: "$compute_id"
    longlink.io/organization-id: "$organization_id"
spec:
  podSelector:
    matchLabels:
      compute-role: application
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: longlink-system
          podSelector:
            matchLabels:
              app: longlink-gateway
