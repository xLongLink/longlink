# Template for application ingress from the private gateway.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: longlink-gateway-ingress
  namespace: $namespace
spec:
  podSelector:
    matchLabels:
      compute-role: application
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: longlink-system
          podSelector:
            matchLabels:
              app: longlink-gateway
