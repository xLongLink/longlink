# Template for the per-cluster Envoy gateway resources.
---
apiVersion: v1
kind: Secret
metadata:
  name: longlink-gateway-auth
  namespace: longlink-system
  labels:
    app: longlink-gateway
type: Opaque
data:
  gateway-secret: "$gateway_secret"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: longlink-gateway
  namespace: longlink-system
  labels:
    app: longlink-gateway
data:
  envoy.yaml: $envoy_config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: longlink-gateway
  namespace: longlink-system
  labels:
    app: longlink-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: longlink-gateway
  template:
    metadata:
      annotations:
        longlink.io/config-hash: $config_hash
      labels:
        app: longlink-gateway
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: render-config
          image: busybox:1.36.1
          command:
            - sh
            - -c
            - >-
              sed 's|__LONG_LINK_GATEWAY_SECRET__|'"$$LONG_LINK_GATEWAY_SECRET"'|g'
              /etc/envoy-template/envoy.yaml >
              /etc/envoy/envoy.yaml
          env:
            - name: LONG_LINK_GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: longlink-gateway-auth
                  key: gateway-secret
          volumeMounts:
            - name: template
              mountPath: /etc/envoy-template
              readOnly: true
            - name: config
              mountPath: /etc/envoy
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      containers:
        - name: longlink-gateway
          image: envoyproxy/envoy:v1.31.5
          args:
            - -c
            - /etc/envoy/envoy.yaml
          ports:
            - name: gateway
              containerPort: 8443
            - name: admin
              containerPort: 9901
          readinessProbe:
            httpGet:
              path: /ready
              port: gateway
              scheme: HTTP
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: gateway
              scheme: HTTP
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/envoy
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: template
          configMap:
            name: longlink-gateway
        - name: config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: longlink-gateway
  namespace: longlink-system
  labels:
    app: longlink-gateway
spec:
  type: ClusterIP
  selector:
    app: longlink-gateway
  ports:
    - name: gateway
      protocol: TCP
      port: 80
      targetPort: gateway
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: longlink-gateway-ingress
  namespace: longlink-system
  labels:
    app: longlink-gateway
spec:
  podSelector:
    matchLabels:
      app: longlink-gateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8443
