# Template for per-compute Envoy gateway resources other than its early LoadBalancer Service.
---
apiVersion: v1
kind: Secret
metadata:
  name: longlink-gateway-auth
  namespace: longlink-system
  annotations:
    longlink.io/platform-version: "$platform_version"
    longlink.io/runtime-revision: "$runtime_revision"
    longlink.io/template-revision: "$template_revision"
  labels:
    app: longlink-gateway
    app.kubernetes.io/managed-by: longlink-platform
    longlink.io/compute-id: "$compute_id"
type: Opaque
stringData:
  gateway-secret: $gateway_secret
---
apiVersion: v1
kind: Secret
metadata:
  name: longlink-gateway-tls
  namespace: longlink-system
  annotations:
    longlink.io/platform-version: "$platform_version"
    longlink.io/runtime-revision: "$runtime_revision"
    longlink.io/template-revision: "$template_revision"
  labels:
    app: longlink-gateway
    app.kubernetes.io/managed-by: longlink-platform
    longlink.io/compute-id: "$compute_id"
type: kubernetes.io/tls
stringData:
  ca.crt: $ca_certificate
  tls.crt: $tls_certificate
  tls.key: $tls_private_key
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: longlink-gateway
  namespace: longlink-system
  annotations:
    longlink.io/platform-version: "$platform_version"
    longlink.io/runtime-revision: "$runtime_revision"
    longlink.io/template-revision: "$template_revision"
  labels:
    app: longlink-gateway
    app.kubernetes.io/managed-by: longlink-platform
    longlink.io/compute-id: "$compute_id"
data:
  envoy.yaml: $envoy_config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: longlink-gateway
  namespace: longlink-system
  annotations:
    longlink.io/platform-version: "$platform_version"
    longlink.io/runtime-revision: "$runtime_revision"
    longlink.io/template-revision: "$template_revision"
  labels:
    app: longlink-gateway
    app.kubernetes.io/managed-by: longlink-platform
    longlink.io/compute-id: "$compute_id"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: longlink-gateway
  template:
    metadata:
      annotations:
        longlink.io/platform-version: "$platform_version"
        longlink.io/runtime-revision: "$runtime_revision"
        longlink.io/template-revision: "$template_revision"
      labels:
        app: longlink-gateway
        app.kubernetes.io/managed-by: longlink-platform
        longlink.io/compute-id: "$compute_id"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: render-config
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            - sh
            - -c
            - >-
              sed 's|__LONG_LINK_GATEWAY_SECRET__|'"$$LONG_LINK_GATEWAY_SECRET"'|g'
              /etc/envoy-template/envoy.yaml > /etc/envoy/envoy.yaml
          env:
            - name: LONG_LINK_GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: longlink-gateway-auth
                  key: gateway-secret
          volumeMounts:
            - name: template
              mountPath: /etc/envoy-template
              readOnly: true
            - name: config
              mountPath: /etc/envoy
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      containers:
        - name: longlink-gateway
          image: envoyproxy/envoy:v1.38.1@sha256:4e3c734cbe9892a3513c97cf3974ff73cfef5d784f5cceed9ea758a2b80e0c31
          args:
            - -c
            - /etc/envoy/envoy.yaml
          ports:
            - name: gateway
              containerPort: 8443
            - name: admin
              containerPort: 9901
          readinessProbe:
            httpGet:
              path: /ready
              port: gateway
              scheme: HTTPS
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: gateway
              scheme: HTTPS
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/envoy
              readOnly: true
            - name: tls
              mountPath: /etc/envoy-tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: template
          configMap:
            name: longlink-gateway
        - name: config
          emptyDir: {}
        - name: tls
          secret:
            secretName: longlink-gateway-tls
        - name: tmp
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: longlink-gateway-ingress
  namespace: longlink-system
  annotations:
    longlink.io/platform-version: "$platform_version"
    longlink.io/runtime-revision: "$runtime_revision"
    longlink.io/template-revision: "$template_revision"
  labels:
    app: longlink-gateway
    app.kubernetes.io/managed-by: longlink-platform
    longlink.io/compute-id: "$compute_id"
spec:
  podSelector:
    matchLabels:
      app: longlink-gateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8443
