# Template for the local development gateway Ingress.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longlink-gateway
  namespace: longlink-system
  labels:
    app: longlink-gateway
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longlink-gateway
                port:
                  number: 80
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: longlink-gateway
                port:
                  number: 80
