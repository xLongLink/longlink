# Template for one desired LongLink Application workload.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: $application_id
  namespace: $namespace
  annotations:
    longlink.io/platform-version: "$platform_version"
    longlink.io/runtime-revision: "$runtime_revision"
    longlink.io/template-revision: "$template_revision"
  labels:
    app: $application_id
    app.kubernetes.io/managed-by: longlink-platform
    compute-role: application
    longlink.io/application-id: $application_id
    longlink.io/compute-id: "$compute_id"
    longlink.io/organization-id: "$organization_id"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: $application_id
  template:
    metadata:
      annotations:
        longlink.io/platform-version: "$platform_version"
        longlink.io/runtime-revision: "$runtime_revision"
        longlink.io/template-revision: "$template_revision"
      labels:
        app: $application_id
        app.kubernetes.io/managed-by: longlink-platform
        compute-role: application
        longlink.io/application-id: $application_id
        longlink.io/compute-id: "$compute_id"
        longlink.io/organization-id: "$organization_id"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: application
          image: $image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: $application_id
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: app-$application_id
  namespace: $namespace
  annotations:
    longlink.io/platform-version: "$platform_version"
    longlink.io/runtime-revision: "$runtime_revision"
    longlink.io/template-revision: "$template_revision"
  labels:
    app: $application_id
    app.kubernetes.io/managed-by: longlink-platform
    compute-role: application
    longlink.io/application-id: $application_id
    longlink.io/compute-id: "$compute_id"
    longlink.io/organization-id: "$organization_id"
spec:
  type: ClusterIP
  selector:
    app: $application_id
  ports:
    - name: http
      port: 8000
      targetPort: http
