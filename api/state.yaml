apiVersion: v1
kind: Service
metadata:
  name: compute-router
  namespace: default
  labels:
    managed-by: control-plane
    compute-role: base
spec:
  selector:
    app: compute-router
  ports:
  - port: 5678
    targetPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute-router
  namespace: default
  labels:
    managed-by: control-plane
    compute-role: base
    app: compute-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compute-router
  template:
    metadata:
      labels:
        app: compute-router
    spec:
      containers:
      - name: compute-router
        image: hashicorp/http-echo:1.0.0
        args:
        - -listen=:5678
        - -status=404
        - -text=application not found
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: sample1
  namespace: default
  labels:
    managed-by: control-plane
    compute-role: application
spec:
  selector:
    app: sample1
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample1
  namespace: default
  labels:
    managed-by: control-plane
    compute-role: application
    app: sample1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample1
  template:
    metadata:
      labels:
        app: sample1
    spec:
      containers:
      - name: sample1
        image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
        ports:
        - containerPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/use-regex: 'true'
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  labels:
    managed-by: control-plane
    compute-role: base
spec:
  ingressClassName: nginx
  defaultBackend:
    service:
      name: compute-router
      port:
        number: 5678
  rules:
  - host: localhost
    http:
      paths:
      - path: /sample1(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: sample1
            port:
              number: 80
