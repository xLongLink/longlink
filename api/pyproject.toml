[build-system]
requires = ['setuptools>=69', 'setuptools_scm[toml]>=8']
build-backend = 'setuptools.build_meta'

[project]
name = 'longlink-api'
dynamic = ['version']
description = 'LongLink backend API'
readme = 'README.md'
requires-python = '>=3.12'
dependencies = [
    'aiosqlite',
    'alembic',
    'authlib',
    'email-validator',
    'fastapi',
    'fsspec',
    'httpx',
    'itsdangerous',
    'pydantic',
    'pydantic-settings',
    'python-dotenv',
    'psycopg[binary,pool]',
    'sqlalchemy',
    'sqlmodel',
    'starlette',
    'kr8s',
    'boto3',
    'xmltodict',
    'sniffio',
    'kubernetes',
    'jinja2',
    'lxml',
    'longlink',
    "uvicorn<0.48.0",
]

[project.optional-dependencies]
dev = [
    'mypy==1.18.2',
    'ruff==0.14.0',
    'pytest==8.4.2',
    'pytest-asyncio==1.2.0',
    'isort==8.0.1',
    'testcontainers==4.13.2',
]

[tool.setuptools_scm]
version_scheme = 'no-guess-dev'
local_scheme = 'no-local-version'
fallback_version = '0.0.0'

[tool.setuptools]
py-modules = ['main']

[tool.setuptools.packages.find]
include = ['src*']

[tool.uv.sources]
longlink = { path = '../sdk', editable = true }


[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["UP", "D300"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["D300"]

[tool.isort]
from_first = false
no_sections = true
lines_between_types = 0
length_sort = true

[tool.pytest.ini_options]
markers = [
    "integration: marks integration tests requiring docker/keycloak",
    "unit: marks unit tests",
]
asyncio_mode = "auto"
env = [
    "ENV=testing",
]
