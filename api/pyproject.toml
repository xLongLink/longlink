[build-system]
requires = ['setuptools>=69']
build-backend = 'setuptools.build_meta'

[project]
name = 'longlink-api'
version = '0.0.0'
description = 'LongLink backend API'
readme = 'README.md'
requires-python = '>=3.12'
dependencies = [
    'aiosqlite==0.22.1',
    'alembic==1.18.4',
    'authlib==1.6.7',
    'email-validator==2.3.0',
    'fastapi==0.128.8',
    'fsspec',
    'httpx==0.28.1',
    'itsdangerous==2.2.0',
    'pydantic==2.12.5',
    'pydantic-settings',
    'python-dotenv==1.2.1',
    'sqlalchemy==2.0.46',
    'starlette==0.52.1',
    'uvicorn==0.40.0',
]

[project.optional-dependencies]
dev = [
    'mypy==1.18.2',
    'ruff==0.14.0',
    'pytest==8.4.2',
]

[tool.setuptools]
py-modules = ['main']

[tool.setuptools.packages.find]
include = ['src*']
